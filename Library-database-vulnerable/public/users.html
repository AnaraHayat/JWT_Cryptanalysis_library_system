<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Library Management System</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="page-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-book-open"></i>
                </div>
                <div>
                    <h2>Library System</h2>
                    <span>Management Portal</span>
                </div>
            </div>
            
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="dashboard.html" class="nav-link">
                            <i class="fas fa-th-large"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="books.html" class="nav-link">
                            <i class="fas fa-book"></i>
                            <span>Manage Books</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="members.html" class="nav-link">
                            <i class="fas fa-users"></i>
                            <span>Manage Members</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="authors.html" class="nav-link">
                            <i class="fas fa-pen-fancy"></i>
                            <span>Manage Authors</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="publishers.html" class="nav-link">
                            <i class="fas fa-building"></i>
                            <span>Manage Publishers</span>
                        </a>
                    </li>
                    
                    <div class="nav-divider"></div>
                    
                    <li class="nav-item">
                        <a href="borrowing.html" class="nav-link">
                            <i class="fas fa-exchange-alt"></i>
                            <span>Borrow / Return</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="availability.html" class="nav-link">
                            <i class="fas fa-check-circle"></i>
                            <span>Check Availability</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="fines.html" class="nav-link">
                            <i class="fas fa-dollar-sign"></i>
                            <span>Manage Fines</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="reports.html" class="nav-link">
                            <i class="fas fa-chart-bar"></i>
                            <span>Reports</span>
                        </a>
                    </li>
                    
                    <div class="nav-divider"></div>
                    
                    <li class="nav-item">
                        <a href="users.html" class="nav-link active">
                            <i class="fas fa-user-cog"></i>
                            <span>Manage Users</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i>
                            <span>Logout</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="content-wrapper">
            <div class="page-header">
                <h1>
                    <i class="fas fa-user-cog"></i>
                    Manage Users
                </h1>
            </div>

            <!-- Form Card -->
            <div class="form-card">
                <h2>
                    <i class="fas fa-user-plus"></i>
                    User Information
                </h2>
                
                <form id="userForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="txtUserID">User ID</label>
                            <input type="text" id="txtUserID" placeholder="e.g., U001" required>
                        </div>
                        <div class="form-group">
                            <label for="txtUsername">Username</label>
                            <input type="text" id="txtUsername" placeholder="Enter username" required>
                        </div>
                        <div class="form-group">
                            <label for="txtPassword">Password</label>
                            <input type="password" id="txtPassword" placeholder="Enter password" required>
                        </div>
                        <div class="form-group">
                            <label for="txtRole">Role</label>
                            <select id="txtRole">
                                <option value="">Select Role</option>
                                <option value="Admin">Admin</option>
                                <option value="Librarian">Librarian</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="button-group">
                        <button type="button" class="btn btn-success" onclick="addUser()">
                            <i class="fas fa-plus"></i> Add
                        </button>
                        <button type="button" class="btn btn-primary" onclick="updateUser()">
                            <i class="fas fa-edit"></i> Update
                        </button>
                        <button type="button" class="btn btn-danger" onclick="deleteUser()">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="clearForm()">
                            <i class="fas fa-eraser"></i> Clear
                        </button>
                    </div>
                </form>
            </div>

            <!-- Data Table -->
            <div class="table-card">
                <div class="table-header">
                    <h2>
                        <i class="fas fa-list"></i>
                        Users List
                    </h2>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Search by username...">
                        <button class="btn btn-info" onclick="searchUsers()">
                            <i class="fas fa-search"></i> Search
                        </button>
                        <button class="btn btn-secondary" onclick="loadUsers()">
                            <i class="fas fa-sync"></i> Refresh
                        </button>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table class="data-table" id="usersTable">
                        <thead>
                            <tr>
                                <th>UserID</th>
                                <th>Username</th>
                                <th>Password</th>
                                <th>Role</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <!-- Data will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/api.js"></script>
    <script>
        // Check authentication and role
        const role = sessionStorage.getItem('userRole');
        if (!role) {
            window.location.href = 'index.html';
        }
        if (role !== 'Admin') {
            showToast('You do not have permission to access this page.', 'error');
            window.location.href = 'dashboard.html';
        }

        // Load users on page load
        document.addEventListener('DOMContentLoaded', loadUsers);

        async function loadUsers() {
            try {
                const data = await API.getUsers();
                renderTable(data);
            } catch (error) {
                showToast('Error loading users: ' + error.message, 'error');
            }
        }

        function renderTable(users) {
            const tbody = document.getElementById('usersTableBody');
            
            if (users.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 40px;">
                            <i class="fas fa-user-cog" style="font-size: 48px; color: #BCAAA4;"></i>
                            <p style="margin-top: 15px; color: #8D6E63;">No users found</p>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = users.map(user => `
                <tr class="clickable" onclick="selectUser(${JSON.stringify(user).replace(/"/g, '&quot;')})">
                    <td>${user.UserID || ''}</td>
                    <td>${user.Username || ''}</td>
                    <td>••••••••</td>
                    <td><span class="badge ${user.Role === 'Admin' ? 'badge-warning' : 'badge-success'}">${user.Role || ''}</span></td>
                </tr>
            `).join('');
        }

        function selectUser(user) {
            document.getElementById('txtUserID').value = user.UserID || '';
            document.getElementById('txtUsername').value = user.Username || '';
            document.getElementById('txtPassword').value = user.Password || '';
            document.getElementById('txtRole').value = user.Role || '';
        }

        async function addUser() {
            const userId = document.getElementById('txtUserID').value.trim();
            const username = document.getElementById('txtUsername').value.trim();
            const password = document.getElementById('txtPassword').value.trim();
            const userRole = document.getElementById('txtRole').value;
            
            if (!userId || !username || !password) {
                showToast('User ID, Username, and Password are required.', 'error');
                return;
            }
            
            const userData = {
                UserID: userId,
                Username: username,
                Password: password,
                Role: userRole
            };
            
            try {
                const result = await API.addUser(userData);
                showToast(result.message, result.success ? 'success' : 'error');
                if (result.success) {
                    clearForm();
                    loadUsers();
                }
            } catch (error) {
                showToast('Error adding user: ' + error.message, 'error');
            }
        }

        async function updateUser() {
            const userId = document.getElementById('txtUserID').value.trim();
            
            if (!userId) {
                showToast('User ID is required to update.', 'error');
                return;
            }
            
            const userData = {
                Username: document.getElementById('txtUsername').value.trim(),
                Password: document.getElementById('txtPassword').value.trim(),
                Role: document.getElementById('txtRole').value
            };
            
            try {
                const result = await API.updateUser(userId, userData);
                showToast(result.message, result.success ? 'success' : 'error');
                loadUsers();
            } catch (error) {
                showToast('Error updating user: ' + error.message, 'error');
            }
        }

        async function deleteUser() {
            const userId = document.getElementById('txtUserID').value.trim();
            const username = document.getElementById('txtUsername').value.trim();
            
            if (!userId && !username) {
                showToast('Enter User ID or Username to delete.', 'error');
                return;
            }
            
            if (!confirm('Are you sure you want to delete this user?')) return;
            
            try {
                const result = await API.deleteUser(userId);
                showToast(result.message, result.success ? 'success' : 'error');
                if (result.success) {
                    clearForm();
                    loadUsers();
                }
            } catch (error) {
                showToast('Error deleting user: ' + error.message, 'error');
            }
        }

        async function searchUsers() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            
            if (!searchTerm) {
                loadUsers();
                return;
            }
            
            try {
                const data = await API.searchUsers(searchTerm);
                renderTable(data);
                if (data.length === 0) {
                    showToast('No users found.', 'info');
                }
            } catch (error) {
                showToast('Error searching users: ' + error.message, 'error');
            }
        }

        function clearForm() {
            document.getElementById('userForm').reset();
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        // Search on Enter key
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchUsers();
        });
    </script>
</body>
</html>
